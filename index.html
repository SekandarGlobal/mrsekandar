<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice AI Orb</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; }
        #orb-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        #ui { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; pointer-events: none; color: white; }
        .btn { pointer-events: auto; background: white; color: black; padding: 15px 40px; border-radius: 99px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: transform 0.2s; }
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div id="orb-container"></div>

    <div id="ui">
        <button id="talk-btn" class="btn">Talk</button>
        <p id="status" class="mt-4 opacity-50 uppercase text-xs tracking-widest">Awaiting AI</p>
    </div>

    <script type="module">
        import { Renderer, Program, Mesh, Triangle, Vec3 } from 'https://cdn.skypack.dev/ogl';

        // --- CONFIG (From your Props) ---
        const hue = 0;
        const voiceSensitivity = 1.5;
        const maxRotationSpeed = 1.2;
        const maxHoverIntensity = 0.8;

        const ctn = document.getElementById('orb-container');
        const talkBtn = document.getElementById('talk-btn');
        const statusText = document.getElementById('status');

        let audioCtx, analyser, dataArray, source;
        let isAiTalking = false;

        // --- SPEECH LOGIC ---
        const synth = window.speechSynthesis;
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'en-US';

        function speak(text, onEnd) {
            const utter = new SpeechSynthesisUtterance(text);
            isAiTalking = true;
            utter.onend = () => {
                isAiTalking = false;
                if (onEnd) onEnd();
            };
            synth.speak(utter);
        }

        talkBtn.onclick = async () => {
            if (!audioCtx) await initMic();
            statusText.innerText = "AI Speaking...";
            speak("Hello can you tell me your name", () => {
                statusText.innerText = "Listening for name...";
                recognition.start();
            });
        };

        recognition.onresult = (event) => {
            const result = event.results[0][0].transcript;
            const name = result.toLowerCase().replace(/it's|my name is|i'm|i am/g, "").trim();
            statusText.innerText = `Greeting ${name}...`;
            speak(`hello ${name} how are you how can I assist you`);
        };

        // --- YOUR EXACT SHADERS ---
        const vert = `precision highp float; attribute vec2 position; attribute vec2 uv; varying vec2 vUv; void main() { vUv = uv; gl_Position = vec4(position, 0.0, 1.0); }`;
        const frag = `
            precision highp float;
            uniform float iTime; uniform vec3 iResolution; uniform float hue;
            uniform float hover; uniform float rot; uniform float hoverIntensity;
            varying vec2 vUv;

            vec3 rgb2yiq(vec3 c) { return vec3(dot(c, vec3(0.299, 0.587, 0.114)), dot(c, vec3(0.596, -0.274, -0.322)), dot(c, vec3(0.211, -0.523, 0.312))); }
            vec3 yiq2rgb(vec3 c) { return vec3(c.x + 0.956*c.y + 0.621*c.z, c.x - 0.272*c.y - 0.647*c.z, c.x - 1.106*c.y + 1.703*c.z); }
            vec3 adjustHue(vec3 color, float hueDeg) {
                float hueRad = hueDeg * 3.14159265 / 180.0;
                vec3 yiq = rgb2yiq(color);
                float cosA = cos(hueRad), sinA = sin(hueRad);
                float i = yiq.y * cosA - yiq.z * sinA, q = yiq.y * sinA + yiq.z * cosA;
                yiq.y = i; yiq.z = q; return yiq2rgb(yiq);
            }
            vec3 hash33(vec3 p3) { p3 = fract(p3 * vec3(0.1031, 0.11369, 0.13787)); p3 += dot(p3, p3.yxz + 19.19); return -1.0 + 2.0 * fract(vec3(p3.x+p3.y, p3.x+p3.z, p3.y+p3.z)*p3.zyx); }
            float snoise3(vec3 p) {
                const float K1 = 0.333333333, K2 = 0.166666667;
                vec3 i = floor(p + (p.x+p.y+p.z)*K1);
                vec3 d0 = p - (i - (i.x+i.y+i.z)*K2);
                vec3 e = step(vec3(0.0), d0 - d0.yzx);
                vec3 i1 = e * (1.0-e.zxy), i2 = 1.0 - e.zxy * (1.0-e);
                vec3 d1 = d0 - (i1-K2), d2 = d0 - (i2-K1), d3 = d0 - 0.5;
                vec4 h = max(0.6 - vec4(dot(d0,d0), dot(d1,d1), dot(d2,d2), dot(d3,d3)), 0.0);
                vec4 n = h*h*h*h * vec4(dot(d0,hash33(i)), dot(d1,hash33(i+i1)), dot(d2,hash33(i+i2)), dot(d3,hash33(i+1.0)));
                return dot(vec4(31.316), n);
            }
            vec4 extractAlpha(vec3 colorIn) { float a = max(max(colorIn.r, colorIn.g), colorIn.b); return vec4(colorIn.rgb / (a + 1e-5), a); }
            
            const vec3 baseColor1 = vec3(0.611765, 0.262745, 0.996078);
            const vec3 baseColor2 = vec3(0.298039, 0.760784, 0.913725);
            const vec3 baseColor3 = vec3(0.062745, 0.078431, 0.600000);

            vec4 draw(vec2 uv) {
                vec3 color1 = adjustHue(baseColor1, hue), color2 = adjustHue(baseColor2, hue), color3 = adjustHue(baseColor3, hue);
                float ang = atan(uv.y, uv.x), len = length(uv);
                float n0 = snoise3(vec3(uv * 0.65, iTime * 0.5)) * 0.5 + 0.5;
                float r0 = mix(mix(0.6, 1.0, 0.4), mix(0.6, 1.0, 0.6), n0);
                float d0 = distance(uv, (r0 / (len + 0.0001)) * uv);
                float v0 = 1.0 / (1.0 + d0 * 10.0);
                v0 *= smoothstep(r0 * 1.05, r0, len);
                float cl = cos(ang + iTime * 2.0) * 0.5 + 0.5;
                vec2 pos = vec2(cos(iTime * -1.0), sin(iTime * -1.0)) * r0;
                float v1 = (1.5 / (1.0 + distance(uv, pos) * distance(uv, pos) * 5.0)) * (1.0 / (1.0 + d0 * 50.0));
                float v2 = smoothstep(1.0, mix(0.6, 1.0, n0 * 0.5), len);
                float v3 = smoothstep(0.6, mix(0.6, 1.0, 0.5), len);
                vec3 col = clamp(mix(color3, mix(color1, color2, cl), v0) + v1, 0.0, 1.0) * v2 * v3;
                return extractAlpha(col);
            }

            void main() {
                vec2 center = iResolution.xy * 0.5;
                float size = min(iResolution.x, iResolution.y);
                vec2 uv = (vUv * iResolution.xy - center) / size * 2.0;
                float s = sin(rot), c = cos(rot);
                uv = vec2(c * uv.x - s * uv.y, s * uv.x + c * uv.y);
                uv.x += hover * hoverIntensity * 0.1 * sin(uv.y * 10.0 + iTime);
                uv.y += hover * hoverIntensity * 0.1 * sin(uv.x * 10.0 + iTime);
                vec4 col = draw(uv);
                gl_FragColor = vec4(col.rgb * col.a, col.a);
            }
        `;

        // --- ORB RENDERER ---
        const renderer = new Renderer({ alpha: true, antialias: true, dpr: window.devicePixelRatio });
        const gl = renderer.gl;
        ctn.appendChild(gl.canvas);

        const program = new Program(gl, {
            vertex: vert, fragment: frag,
            uniforms: {
                iTime: { value: 0 }, iResolution: { value: new Vec3() },
                hue: { value: hue }, hover: { value: 0 }, rot: { value: 0 }, hoverIntensity: { value: 0 }
            }
        });
        const mesh = new Mesh(gl, { geometry: new Triangle(gl), program });

        function resize() {
            renderer.setSize(window.innerWidth, window.innerHeight);
            program.uniforms.iResolution.value.set(gl.canvas.width, gl.canvas.height, gl.canvas.width / gl.canvas.height);
        }
        window.onresize = resize;
        resize();

        async function initMic() {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioCtx = new AudioContext();
            analyser = audioCtx.createAnalyser();
            source = audioCtx.createMediaStreamSource(stream);
            analyser.fftSize = 512;
            source.connect(analyser);
            dataArray = new Uint8Array(analyser.frequencyBinCount);
        }

        let lastTime = 0, currentRot = 0;
        function update(t) {
            requestAnimationFrame(update);
            const dt = (t - lastTime) * 0.001;
            lastTime = t;
            program.uniforms.iTime.value = t * 0.001;

            let level = 0;
            if (analyser && dataArray) {
                analyser.getByteFrequencyData(dataArray);
                let sum = 0;
                for (let i = 0; i < dataArray.length; i++) {
                    let v = dataArray[i] / 255;
                    sum += v * v;
                }
                level = Math.sqrt(sum / dataArray.length) * voiceSensitivity * 3.0;
            }

            // Make the orb dance if the AI is speaking, even if mic isn't active
            if (isAiTalking) level = 0.5 + Math.sin(t * 0.01) * 0.3;

            currentRot += dt * (0.3 + level * maxRotationSpeed);
            program.uniforms.rot.value = currentRot;
            program.uniforms.hover.value = Math.min(level * 2.0, 1.0);
            program.uniforms.hoverIntensity.value = Math.min(level * maxHoverIntensity, maxHoverIntensity);

            renderer.render({ scene: mesh });
        }
        requestAnimationFrame(update);
    </script>
</body>
</html>
