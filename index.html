<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .container {
            text-align: center;
            max-width: 600px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        h1 {
            margin-bottom: 16px;
            font-size: 2.5rem;
        }
        p {
            font-size: 1.1rem;
            line-height: 1.6;
            opacity: 0.9;
        }
        button {
            margin-top: 24px;
            padding: 12px 28px;
            font-size: 1rem;
            border: none;
            border-radius: 6px;
            background-color: #00c6ff;
            color: #003344;
            cursor: pointer;
        }
        button:hover {
            background-color: #00a8d8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome</h1>
        <p>
            Welcome to our platform. We are glad to have you here.
            Explore, build, and grow with confidence.
        </p>
        <button onclick="alert('Welcome aboard!')">Get Started</button>
    </div>
</body>
</html>
