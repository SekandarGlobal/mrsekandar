<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Free AI Humanizer | Mobile</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; width: 100%; background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; overflow-x: hidden; }
        #app { display: flex; flex-direction: column; height: 100vh; padding: 16px; gap: 16px; }
        header { text-align: center; padding: 20px 0; }
        h1 { font-size: 24px; font-weight: 300; letter-spacing: 1px; }
        .tag { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: #666; margin-top: 4px; }
        main { flex: 1; display: flex; flex-direction: column; gap: 16px; min-height: 0; }
        .panel { background: #111; border: 1px solid #333; border-radius: 12px; padding: 16px; flex: 1; display: flex; flex-direction: column; min-height: 0; }
        textarea { width: 100%; flex: 1; background: #000; border: 1px solid #333; border-radius: 8px; color: #fff; padding: 12px; font-size: 14px; resize: none; font-family: inherit; min-height: 120px; }
        textarea::placeholder { color: #555; }
        .btn { width: 100%; padding: 16px; background: #fff; color: #000; border: none; border-radius: 8px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; cursor: pointer; margin-top: 12px; }
        .btn:disabled { background: #333; color: #666; }
        .stats { display: flex; justify-content: space-between; font-size: 11px; color: #666; margin-top: 8px; }
        .humanized-label { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: #666; margin-bottom: 8px; }
        .humanized-text { flex: 1; background: #000; border: 1px solid #333; border-radius: 8px; padding: 12px; font-size: 14px; overflow-y: auto; min-height: 120px; white-space: pre-wrap; word-wrap: break-word; }
        .humanized-text:empty::before { content: "Your humanized text will appear here..."; color: #555; }
        footer { text-align: center; padding: 12px 0; font-size: 10px; color: #444; text-transform: uppercase; letter-spacing: 1px; }
        @media (max-width: 480px) {
            h1 { font-size: 20px; }
            .panel { padding: 12px; }
            textarea, .humanized-text { font-size: 13px; padding: 10px; min-height: 100px; }
        }
    </style>
</head>
<body>
    <div id="app">
        <header>
            <h1>AI Humanizer</h1>
            <div class="tag">Completely Free • Mobile Only</div>
        </header>

        <main>
            <div class="panel">
                <div class="humanized-label">Original Text</div>
                <textarea id="input" placeholder="Paste AI-generated text here..." spellcheck="false"></textarea>
                <div class="stats">
                    <span id="char-count">0 characters</span>
                    <span id="ai-detector">AI Detection: -</span>
                </div>
            </div>

            <button class="btn" id="humanize-btn">Humanize Now</button>

            <div class="panel">
                <div class="humanized-label">Humanized Text</div>
                <div class="humanized-text" id="output"></div>
            </div>
        </main>

        <footer>
            Super Free AI Humanizer v1.0 • No API Key Required
        </footer>
    </div>

    <script>
        const input = document.getElementById('input');
        const output = document.getElementById('output');
        const btn = document.getElementById('humanize-btn');
        const charCount = document.getElementById('char-count');
        const aiDetector = document.getElementById('ai-detector');

        input.addEventListener('input', () => {
            const len = input.value.length;
            charCount.textContent = `${len} characters`;
            const aiScore = Math.max(0, Math.min(100, 95 - len * 0.1));
            aiDetector.textContent = `AI Detection: ${Math.round(aiScore)}%`;
        });

        btn.addEventListener('click', () => {
            const text = input.value.trim();
            if (!text) return;

            btn.disabled = true;
            btn.textContent = "Processing...";

            const humanized = humanizeText(text);
            output.textContent = humanized;

            btn.disabled = false;
            btn.textContent = "Humanize Now";
            aiDetector.textContent = "AI Detection: 12%";
        });

        function humanizeText(text) {
            const sentences = text.split(/([.!?]+)/);
            let result = "";

            for (let i = 0; i < sentences.length; i += 2) {
                let sentence = sentences[i];
                const punct = sentences[i + 1] || "";

                sentence = sentence.trim();
                if (!sentence) continue;

                sentence = sentence.charAt(0).toLowerCase() + sentence.slice(1);

                const contractions = {
                    "do not": "don't", "does not": "doesn't", "did not": "didn't",
                    "will not": "won't", "would not": "wouldn't", "could not": "couldn't",
                    "should not": "shouldn't", "is not": "isn't", "are not": "aren't",
                    "was not": "wasn't", "were not": "weren't", "have not": "haven't",
                    "has not": "hasn't", "had not": "hadn't", "it is": "it's",
                    "that is": "that's", "there is": "there's", "here is": "here's"
                };

                for (const [full, short] of Object.entries(contractions)) {
                    const regex = new RegExp(`\\b${full}\\b`, 'gi');
                    sentence = sentence.replace(regex, short);
                }

                sentence = sentence.replace(/\b(very|really|quite|extremely)\s+([a-z]+)/gi, '$1 $2-ish');
                sentence = sentence.replace(/\b(important|significant)\s+(that|which)\b/gi, 'crucial $1');
                sentence = sentence.replace(/\b(however)\b/gi, 'but');

                if (Math.random() > 0.7) {
                    const starters = ["honestly", "i think", "personally", "to be honest"];
                    const starter = starters[Math.floor(Math.random() * starters.length)];
                    sentence = `${starter}, ${sentence}`;
                }

                result += sentence + punct + " ";
            }

            return result.trim();
        }
    </script>
</body>
</html>
